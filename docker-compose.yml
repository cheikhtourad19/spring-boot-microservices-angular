networks:
  microservices-net:
    driver: bridge

volumes:
  postgres-data:
  mysql-data:
  mongo-data:


services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: microservices_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: microservices_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./microservices_db.sql:/docker-entrypoint-initdb.d/microservices_db.sql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=password"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb
      MONGO_INITDB_DATABASE: microservices_answers_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  eureka-service:
    build:
      context: ./backend
      dockerfile: eureka-service/Dockerfile
    container_name: eureka-service
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=eureka-service
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s


  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=user-service
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/microservices_users
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - microservices-net


  course-service:
    build:
      context: ./backend
      dockerfile: course-service/Dockerfile
    container_name: course-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=course-service
      - SERVER_PORT=8081
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/microservices_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQL8Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED=false
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - microservices-net


  exam-service:
    build:
      context: ./backend
      dockerfile: exam-service/Dockerfile
    container_name: exam-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_APPLICATION_NAME=exam-service
      - SERVER_PORT=8082
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/microservices_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQL8Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED=false
    depends_on:
      mysql:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - microservices-net


  answer-service:
    build:
      context: ./backend
      dockerfile: answer-service/Dockerfile
    container_name: answer-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_APPLICATION_NAME=answer-service
      - SERVER_PORT=8083
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:mongodb@mongodb:27017/microservices_answers_db?authSource=admin
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED=false
    depends_on:
      mongodb:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    networks:
      - microservices-net


  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway-service/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - SPRING_APPLICATION_NAME=api-gateway-service
      - SERVER_PORT=8090
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=true
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID=true
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_ID=user-core
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_URI=lb://USER-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[0]_PREDICATES[0]=Path=/students/**
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_ID=course-core
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_URI=lb://COURSE-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[1]_PREDICATES[0]=Path=/courses/**
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_ID=exams-core
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_URI=lb://EXAM-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[2]_PREDICATES[0]=Path=/exams/**
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_ID=answer-core
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_URI=lb://ANSWER-SERVICE
      - SPRING_CLOUD_GATEWAY_ROUTES[3]_PREDICATES[0]=Path=/answers/**
      - SPRING_CLOUD_LOADBALANCER_RIBBON_ENABLED=false
      - SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_[/**]_ALLOWED_ORIGIN_PATTERNS=*
      - SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_[/**]_ALLOWED_METHODS=GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD
      - SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_[/**]_ALLOWED_HEADERS=*
      - SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_[/**]_ALLOW_CREDENTIALS=true
      - SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS_CONFIGURATIONS_[/**]_MAX_AGE=3600
      - SPRING_CLOUD_GATEWAY_DEFAULT_FILTERS[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
    depends_on:
      eureka-service:
        condition: service_healthy
      user-service:
        condition: service_started
      course-service:
        condition: service_started
      exam-service:
        condition: service_started
      answer-service:
        condition: service_started
    networks:
      - microservices-net


  zuul-service:
    build:
      context: ./backend
      dockerfile: zuul-service/Dockerfile
    container_name: zuul-service
    restart: unless-stopped
    ports:
      - "8091:8090"
    environment:
      - SPRING_APPLICATION_NAME=zuul-service
      - SERVER_PORT=8090
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-service:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - ZUUL_ROUTES_USER-SERVICE_PATH=/api/students/**
      - ZUUL_ROUTES_USER-SERVICE_SERVICEID=user-service
      - ZUUL_ROUTES_COURSE-SERVICE_PATH=/api/courses/**
      - ZUUL_ROUTES_COURSE-SERVICE_SERVICEID=course-service
      - ZUUL_ROUTES_EXAM-SERVICE_PATH=/api/exams/**
      - ZUUL_ROUTES_EXAM-SERVICE_SERVICEID=exam-service
      - ZUUL_ROUTES_ANSWER-SERVICE_PATH=/api/answers/**
      - ZUUL_ROUTES_ANSWER-SERVICE_SERVICEID=answer-service
    depends_on:
      eureka-service:
        condition: service_healthy
      user-service:
        condition: service_started
      course-service:
        condition: service_started
      exam-service:
        condition: service_started
      answer-service:
        condition: service_started
    networks:
      - microservices-net


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - microservices-net
