
server:
  port: 8091
spring:
  application:
    name: zuul-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

zuul:
  routes:
    user-service:
      path: /api/students/**
      serviceId: user-service
    course-service:
      path: /api/courses/**
      serviceId: course-service
    exam-service:
      path: /api/exams/**
      serviceId: exam-service
    answer-service:
      path: /api/answers/**
      serviceId: answer-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

