server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Angular routing - redirect all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the api-gateway (internal Docker network)
    location /students/ {
        proxy_pass http://api-gateway:8090/students/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /courses/ {
        proxy_pass http://api-gateway:8090/courses/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /exams/ {
        proxy_pass http://api-gateway:8090/exams/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # nginx stub_status — used by nginx-prometheus-exporter
    location /stub_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;   # Docker internal network
        deny all;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
